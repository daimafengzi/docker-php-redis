name: Build and Push Multi-Arch PHP Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔒【关键】安全验证 Secrets（不会泄露任何凭证）
      - name: 🔒 Verify Docker Secrets Exist
        run: |
          echo "🔍 Checking Docker Hub credentials..."
          if [ -z "${DOCKER_USER}" ]; then
            echo "::error::❌ DOCKER_USERNAME secret is MISSING or EMPTY!"
            echo "👉 Go to: Repo Settings → Secrets and Variables → Actions"
            echo "👉 Add secret named EXACTLY: DOCKER_USERNAME"
            exit 1
          fi
          if [ -z "${DOCKER_PASS}" ]; then
            echo "::error::❌ DOCKER_PASSWORD secret is MISSING or EMPTY!"
            echo "👉 Must be a Docker Hub PAT (NOT account password)"
            echo "👉 Generate at: https://hub.docker.com/settings/security"
            exit 1
          fi
          echo "✅ DOCKER_USERNAME configured (length: ${#DOCKER_USER})"
          echo "✅ DOCKER_PASSWORD configured (length: ${#DOCKER_PASS})"
          echo "✅ Proceeding to Docker login..."
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/php-redis-alpine
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
